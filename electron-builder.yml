appId: com.synertrack.desktop
productName: Synertrack

directories:
  output: dist

# Publish target for CI: `electron-builder --publish always` uploads the installers
# to a GitHub Release for the current version tag.
publish:
  provider: github
  owner: hussainbangash
  repo: synertrack-desktop
  releaseType: release

# Only ship the bundled app + runtime resources (icons). Source and dev files
# are excluded; the app has no runtime node_modules (everything is bundled).
files:
  - out/**
  - resources/**
  - package.json

win:
  target:
    - nsis
    - portable
  icon: resources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Synertrack

portable:
  artifactName: Synertrack-portable-${version}.exe
